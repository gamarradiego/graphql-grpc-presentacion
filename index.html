<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphQL & gRPC — Paradigmas de API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0b0d1a; }

      /* Subtle animated background mesh */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 30%, rgba(6, 182, 212, 0.04) 0%, transparent 60%),
          radial-gradient(ellipse 60% 70% at 80% 70%, rgba(167, 139, 250, 0.04) 0%, transparent 60%),
          radial-gradient(ellipse 50% 50% at 50% 50%, rgba(251, 191, 36, 0.02) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      /* Subtle grid overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      #root { position: relative; z-index: 1; }

      /* Smooth slide transitions */
      .spectacle-slide {
        will-change: transform, opacity;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
