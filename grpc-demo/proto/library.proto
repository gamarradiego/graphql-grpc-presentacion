syntax = "proto3";

package library;

service LibraryService {
  rpc GetBooks (GetBooksRequest) returns (GetBooksResponse);
  rpc GetBookById (GetBookByIdRequest) returns (GetBookResponse);
  rpc GetAuthorById (GetAuthorByIdRequest) returns (GetAuthorResponse);
  rpc GetAuthors (GetAuthorsRequest) returns (GetAuthorsResponse);
}

message Author {
  int32 id = 1;
  string name = 2;
  string nationality = 3;
  int32 birthYear = 4;
}

message Book {
  int32 id = 1;
  string title = 2;
  int32 authorId = 3;
  int32 year = 4;
  repeated string genres = 5;
}

message GetBooksRequest {}
message GetBooksResponse {
  repeated Book books = 1;
}

message GetBookByIdRequest {
  int32 id = 1;
}
message GetBookResponse {
  Book book = 1;
}

message GetAuthorByIdRequest {
  int32 id = 1;
}
message GetAuthorResponse {
  Author author = 1;
}

message GetAuthorsRequest {}
message GetAuthorsResponse {
  repeated Author authors = 1;
}
